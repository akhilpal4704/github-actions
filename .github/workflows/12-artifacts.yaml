name: 12-artifacts

on:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        defaults:
            run:
             working-directory: 12-artifacts/react-app
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: setup node
              uses: actions/setup-node@v3
              with:
                    node-version: '24.x'
            - name: install dependencies
              run: npm ci
            - name: run tests
              run: npm run test
            - name: build app
              run: npm run build
            - name: upload artifact
              uses: actions/upload-artifact@v4
              with:
                 name: react-app-build
                 path: 12-artifacts/react-app/build # Upload the 'build' directory as an artifact with the name 'react-app-build'
    deploy:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: download artifact
              uses: actions/download-artifact@v4
              with:
                 name: react-app-build
                 path: build       # Download the artifact to the 'build' directory inside the runner
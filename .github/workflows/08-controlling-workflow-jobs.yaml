name: 08-controlling-workflow-jobs

on:
    workflow_dispatch:
        inputs:
            run-tests:
                type: boolean
                default: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: build step
              run: echo "Building the project"
    unit-tests:
        runs-on: ubuntu-latest
        steps:
            - name: run unit tests
              run: echo "Running unit tests...."
            - name: fail the test step
              if: ${{ !inputs.run-tests}}
              run: exit 1
    deploy-non-prod:
        runs-on: ubuntu-latest
        needs: [build, unit-tests]                # needs keyword to control the job execution order, to run jobs in sequence
        steps:
            - name: deploy to non-prod
              run: echo "Deploying to non-prod environment"
    e2e-tests:
        runs-on: ubuntu-latest
        needs: deploy-non-prod
        steps:
            - name: run e2e tests
              run: echo "Running e2e tests...."
    deploy-prod:
        runs-on: ubuntu-latest
        needs: [e2e-tests]
        steps:
            - name: deploy to prod
              run: echo "Deploying to prod environment"